repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        entry: >-
          bash -c 'for file in "$@"; do
          BLACK_CACHE_DIR=/tmp/schrankerl-black-cache
          black --line-length=120 --workers=1 "$file" || exit $?;
          done' --
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=120"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=120"]
        exclude: (^|/)(__init__|__manifest__)\.py$
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify

  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests
        entry: .venv/bin/python -m unittest discover -s tests
        language: system
        pass_filenames: false
        types: [python]
