services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo-init:
    image: odoo:16.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./addons:/mnt/extra-addons
      - odoo-web-data:/var/lib/odoo
    command:
      - bash
      - -lc
      - |
        set -e
        odoo -d schrankerl_demo -i schrankerl_refill_planner --stop-after-init --db_host=db --db_user=odoo --db_password=odoo --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
        cat <<'PY' | odoo shell -d schrankerl_demo --db_host=db --db_user=odoo --db_password=odoo --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
        env["sch.integration.run"].run_mock_sync()
        env.cr.commit()
        print(env["sch.integration.run"].search_count([]), env["sch.refill.plan.line"].search_count([]))
        PY

  odoo:
    image: odoo:16.0
    depends_on:
      db:
        condition: service_healthy
      odoo-init:
        condition: service_completed_successfully
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./addons:/mnt/extra-addons
      - odoo-web-data:/var/lib/odoo

volumes:
  odoo-db-data:
  odoo-web-data:
